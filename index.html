<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고 관리표</title>
    <style>
        /* 라이트 모드 스타일 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            background-color: #ffffff;
            color: #333333;
        }
        .container { max-width: 800px; position: relative; }
        
        /* 헤더 및 날짜 영역 스타일 */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }
        h2 { margin: 0; }
        .date-container {
            font-size: 14px;
            font-weight: bold;
        }
        .date-container input[type="date"] {
            font-family: inherit;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-weight: bold;
            color: #333333;
        }

        table { border-collapse: collapse; width: 100%; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f4f4f4; font-weight: bold; }
        input { width: 90%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .name-input { text-align: left; font-weight: 500; }
        .sys-input, .cur-input { text-align: right; }
        .error-cell { font-weight: bold; background-color: #fcfcfc; }
        .error-zero { color: #2e7d32; }
        .error-diff { color: #d32f2f; }
        .btn-add { width: 100%; padding: 10px; background-color: #007bff; color: white; border: 1px solid #ddd; border-top: none; border-radius: 0 0 4px 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-add:hover { background-color: #0056b3; }
        .btn-del { padding: 4px 10px; background-color: #dc3545; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .btn-del:hover { background-color: #bd2130; }

        /* 🌙 다크 모드 */
        @media (prefers-color-scheme: dark) {
            body { background-color: #121212; color: #e0e0e0; }
            table { box-shadow: 0 0 15px rgba(255, 255, 255, 0.05); }
            th, td { border: 1px solid #333; }
            th { background-color: #242424; color: #ffffff; }
            input { background-color: #1e1e1e; color: #e0e0e0; border: 1px solid #444; }
            input:focus { outline: none; border-color: #777; background-color: #2a2a2a; }
            input::placeholder { color: #666; }
            .error-cell { background-color: #1a1a1a; }
            .error-zero { color: #81c784; }
            .error-diff { color: #e57373; }
            .btn-add { background-color: #1a73e8; border-color: #333; }
            .btn-add:hover { background-color: #1557b0; }
            .btn-del { background-color: #c62828; }
            .btn-del:hover { background-color: #b71c1c; }
            .date-container input[type="date"] { background-color: #1e1e1e; color: #e0e0e0; border-color: #444; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-area">
            <h2>📦 커스텀 재고 관리표</h2>
            <div class="date-container">
                조사일자: <input type="date" id="inventoryDate">
            </div>
        </div>
        
        <table id="inventoryTable">
            <thead>
                <tr>
                    <th>품목명</th>
                    <th style="width: 18%;">전산재고</th>
                    <th style="width: 18%;">현재고</th>
                    <th style="width: 15%;">오차</th>
                    <th style="width: 12%;">관리</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
        <button id="addEmptyRow" class="btn-add">➕ 새 품목 추가</button>
    </div>

    <script>
        const tbody = document.querySelector("#inventoryTable tbody");
        const dateInput = document.getElementById("inventoryDate");
        
        // 1. 모든 입력값과 날짜를 감지해 URL을 업데이트하는 함수
        function updateURL() {
            const params = new URLSearchParams();
            
            // 날짜 저장 로직 (선택된 날짜가 있다면 YYMMDD 포맷으로 주소에 저장)
            if (dateInput.value) {
                const rawDate = dateInput.value.replace(/-/g, ""); // "2026-06-23" -> "20260623"
                const yyStyle = rawDate.substring(2); // "260623"
                params.set("date", yyStyle);
            }

            const rows = tbody.querySelectorAll("tr");
            rows.forEach((row, index) => {
                const nameInput = row.querySelector(".name-input");
                const sysInput = row.querySelector(".sys-input");
                const curInput = row.querySelector(".cur-input");
                
                if (nameInput && sysInput && curInput) {
                    const nameVal = nameInput.value;
                    const sysVal = sysInput.value;
                    const curVal = curInput.value;
                    
                    if (nameVal !== "" || sysVal !== "" || curVal !== "") {
                        params.set(`n${index}`, nameVal);
                        if (sysVal !== "") params.set(`s${index}`, sysVal);
                        if (curVal !== "") params.set(`c${index}`, curVal);
                    }
                }
            });

            const newUrl = `${window.location.pathname}?${params.toString()}`;
            window.history.replaceState({}, '', newUrl);
        }

        // 2. 테이블에 새로운 행(Row)을 추가하는 함수
        function createRow(initialName = "", initialSys = "", initialCur = "") {
            const tr = document.createElement("tr");

            const tdName = document.createElement("td");
            const inputName = document.createElement("input");
            inputName.type = "text";
            inputName.className = "name-input";
            inputName.placeholder = "품목명 입력";
            inputName.value = initialName;
            tdName.appendChild(inputName);

            const tdSys = document.createElement("td");
            const inputSys = document.createElement("input");
            inputSys.type = "number";
            inputSys.className = "sys-input";
            inputSys.placeholder = "0";
            inputSys.value = initialSys;
            tdSys.appendChild(inputSys);

            const tdCur = document.createElement("td");
            const inputCur = document.createElement("input");
            inputCur.type = "number";
            inputCur.className = "cur-input";
            inputCur.placeholder = "0";
            inputCur.value = initialCur;
            tdCur.appendChild(inputCur);

            const tdError = document.createElement("td");
            tdError.className = "error-cell";
            tdError.textContent = "-";

            const tdAction = document.createElement("td");
            const btnDel = document.createElement("button");
            btnDel.className = "btn-del";
            btnDel.textContent = "삭제";
            btnDel.onclick = function() {
                tr.remove();
                updateURL();
            };
            tdAction.appendChild(btnDel);

            function calculateError() {
                const sysVal = inputSys.value;
                const curVal = inputCur.value;

                if (sysVal !== "" || curVal !== "") {
                    const sysNum = parseInt(sysVal) || 0;
                    const curNum = parseInt(curVal) || 0;
                    const diff = sysNum - curNum;
                    
                    tdError.textContent = diff;
                    tdError.classList.remove("error-zero", "error-diff");
                    if (diff === 0) {
                        tdError.classList.add("error-zero");
                    } else {
                        tdError.classList.add("error-diff");
                    }
                } else {
                    tdError.textContent = "-";
                    tdError.classList.remove("error-zero", "error-diff");
                }
            }

            inputName.addEventListener("input", updateURL);
            inputSys.addEventListener("input", () => { updateURL(); calculateError(); });
            inputCur.addEventListener("input", () => { updateURL(); calculateError(); });

            calculateError();

            tr.appendChild(tdName);
            tr.appendChild(tdSys);
            tr.appendChild(tdCur);
            tr.appendChild(tdError);
            tr.appendChild(tdAction);
            tbody.appendChild(tr);
        }

        // 3. 초기화 (날짜 설정 및 URL 데이터 복원)
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // [날짜 세팅] URL에 date가 있으면 복원, 없으면 오늘 날짜 자동 계산
            if (urlParams.has("date")) {
                const urlDate = urlParams.get("date"); // "260623" 구조
                if (urlDate.length === 6) {
                    const fullYear = "20" + urlDate.substring(0, 2);
                    const month = urlDate.substring(2, 4);
                    const day = urlDate.substring(4, 6);
                    dateInput.value = `${fullYear}-${month}-${day}`;
                }
            } else {
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                dateInput.value = `${yyyy}-${mm}-${dd}`;
            }

            // 날짜 수동 변경 시 URL 업데이트 반영
            dateInput.addEventListener("change", updateURL);

            // [표 데이터 복원]
            const keys = Array.from(urlParams.keys());
            const indices = keys
                .filter(key => key.startsWith('n'))
                .map(key => parseInt(key.substring(1)))
                .filter(idx => !isNaN(idx))
                .sort((a, b) => a - b);

            if (indices.length > 0) {
                indices.forEach(i => {
                    const name = urlParams.get(`n${i}`) || "";
                    const sys = urlParams.get(`s${i}`) || "";
                    const cur = urlParams.get(`c${i}`) || "";
                    createRow(name, sys, cur);
                });
            } else {
                for (let i = 0; i < 5; i++) {
                    createRow();
                }
                updateURL(); // 최초 접속 시 오늘 날짜를 주소창에 바로 각인
            }
        }

        // 줄 추가 버튼
        document.getElementById("addEmptyRow").onclick = function() {
            createRow();
            updateURL();
        };

        init();
    </script>

</body>
</html>
